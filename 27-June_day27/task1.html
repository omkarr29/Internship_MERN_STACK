<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            height: 100px;
            width: 100px;
            background-color: yellow;

        }
        div:hover{
            height: 300px;
            width: 300px;
            background-color: red;
            border-radius: 50%;
        }
        button{
            height: 60px;
            width: 120px;
            background-color: white;
            color: blue;
            border: 1px solid blue;
            border-radius: 20px;
        }
        button:hover{
            color: white;
            background-color: blue;
        }
        a{
          text-decoration: none;  
        }
        a:hover{
            text-decoration-style: solid;
            text-decoration-color: blue;
            text-decoration-line: underline;
            text-decoration-thickness: 0.5px;
            /* text-decoration: solid blu; */
        }
        /* a:visited{
            color: purple;
        } */
        /* a:active{
            color:red;
        } */
        a:link{
          color: yellow;  
        }
    </style>
</head>
<body>
    <!-- hover  visited  active link-->
    <!-- pseudo effect - fake bah  hover visited active link -->
     <a href="https://www.amazon.in">go Amazon page</a>
     <br><br>
     <div></div>
     <br><br>
     <button>Submit</button>
</body>
</html>
<!DOCTYPE html>

<head>

    <style>
        div{
            height: 100px;
            width: 100px;
            background-color: yellow;
            /* transition-property: all; */
            transition-duration: 2s;
            transition-timing-function: ease;
            transition-delay: 2s;
        }
        div:hover{
            height: 300px;
            width: 300px;
            background-color: red;
            border-radius: 30px;
        }
    </style>
</head>
<body>

</body>
